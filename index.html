<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGSTAR | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans m-0 p-0 overflow-y-scroll">

    <nav class="px-6 py-6 md:px-12 md:py-8 flex flex-col md:flex-row justify-between items-center sticky top-0 bg-black z-50 w-full border-b border-zinc-900/50 gap-4 md:gap-0">
        <a href="index.html" class="flex items-center gap-4">
            <img src="images/LOGO.jpg" alt="LOGO" class="h-8 md:h-10 w-auto"> 
            <h1 class="text-2xl md:text-3xl font-black text-yellow-400 uppercase italic tracking-tighter">LEGSTAR</h1>
        </a>
        <div class="flex gap-6 md:gap-10 uppercase text-[10px] md:text-[12px] font-bold tracking-[0.1em] md:tracking-[0.2em]">
            <a href="index.html" class="text-yellow-400">Inicio</a>
            <a href="productos.html" class="text-zinc-500 hover:text-white transition">Productos</a>
            <a href="contacto.html" class="text-zinc-500 hover:text-white transition">Contacto</a>
        </div>
    </nav>

    <header class="relative h-[45vh] md:h-[55vh] w-full overflow-hidden bg-black group">
        
        <div id="carousel" class="absolute inset-0 w-full h-full">
            <div class="carousel-item absolute inset-0 opacity-100 transition-opacity duration-1000 ease-in-out">
                <img src="images/car1.jpg" class="w-full h-full object-cover">
            </div>
            <div class="carousel-item absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
                <img src="images/car2.jpg" class="w-full h-full object-cover">
            </div>
            <div class="carousel-item absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
                <img src="images/car5.jpg" class="w-full h-full object-cover">
            </div>
            <div class="carousel-item absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
                <img src="images/car4.jpg" class="w-full h-full object-cover">
            </div>
            <div class="carousel-item absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
                <img src="images/car3.jpg" class="w-full h-full object-cover">
            </div>
            <div class="carousel-item absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
                <img src="images/car7.jpg" class="w-full h-full object-cover">
            </div>
        </div>

        <button onclick="prevSlide()" class="absolute left-4 top-1/2 -translate-y-1/2 z-20 bg-black/50 text-white p-3 rounded-full hover:bg-yellow-400 hover:text-black transition opacity-0 group-hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <button onclick="nextSlide()" class="absolute right-4 top-1/2 -translate-y-1/2 z-20 bg-black/50 text-white p-3 rounded-full hover:bg-yellow-400 hover:text-black transition opacity-0 group-hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </button>

        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 flex gap-2">
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(0)"></div>
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(1)"></div>
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(2)"></div>
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(3)"></div>
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(4)"></div>
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(5)"></div>
        </div>
    </header>

    <section class="py-12 md:py-20 bg-black px-6 md:px-12">
        <div class="flex items-center gap-4 mb-10">
            <div class="w-2 h-8 bg-yellow-400"></div>
            <h3 class="text-2xl md:text-3xl font-black uppercase italic tracking-tighter">NUEVA COLECCIÓN</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <a href="productos.html?filtro=perfumes" class="relative aspect-square bg-zinc-900 border border-zinc-800 overflow-hidden group cursor-pointer">
                <img src="images/perf1.jpg" alt="Perfumes" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-70 group-hover:opacity-100">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
                    <p class="text-yellow-400 font-bold uppercase tracking-widest text-sm">Ver Perfumes</p>
                </div>
            </a>

            <a href="productos.html?filtro=playeras" class="relative aspect-square bg-zinc-900 border border-zinc-800 overflow-hidden group cursor-pointer">
                <img src="images/play1.jpg" alt="Playeras" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-70 group-hover:opacity-100">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
                    <p class="text-yellow-400 font-bold uppercase tracking-widest text-sm">Ver Playeras</p>
                </div>
            </a>

            <a href="productos.html?filtro=accesorios" class="relative aspect-square bg-zinc-900 border border-zinc-800 overflow-hidden group cursor-pointer">
                <img src="images/cad1.jpg" alt="Accesorios" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-70 group-hover:opacity-100">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
                    <p class="text-yellow-400 font-bold uppercase tracking-widest text-sm">Ver Accesorios</p>
                </div>
            </a>

        </div>
    </section>

    <footer class="p-10 border-t border-zinc-900 text-center text-zinc-700 text-xs bg-black">
        &copy; 2026 LEGSTAR OFFICIAL
    </footer>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-item');
        const dots = document.querySelectorAll('.dot');
        let timer = setInterval(nextSlide, 4000);

        function updateCarousel() {
            slides.forEach((slide, index) => {
                slide.classList.replace(index === currentSlide ? 'opacity-0' : 'opacity-100', index === currentSlide ? 'opacity-100' : 'opacity-0');
            });
            dots.forEach((dot, index) => {
                dot.style.backgroundColor = index === currentSlide ? '#facc15' : 'rgba(255,255,255,0.3)';
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            updateCarousel();
            resetTimer();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            updateCarousel();
            resetTimer();
        }

        function showSlide(index) {
            currentSlide = index;
            updateCarousel();
            resetTimer();
        }

        function resetTimer() {
            clearInterval(timer);
            timer = setInterval(nextSlide, 4000);
        }

        // Iniciar puntito amarillo
        updateCarousel();
    </script>
</body>
</html>
