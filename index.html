<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGSTAR | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans m-0 p-0 overflow-y-auto">

    <nav class="px-6 py-6 md:px-12 md:py-8 flex flex-col md:flex-row justify-between items-center sticky top-0 bg-black z-50 w-full border-b border-zinc-900/50 gap-4 md:gap-0">
        <a href="index.html" class="flex items-center gap-4">
            <img src="images/LOGO.jpg" alt="LOGO" class="h-8 md:h-10 w-auto"> 
            <h1 class="text-2xl md:text-3xl font-black text-yellow-400 uppercase italic tracking-tighter">LEGSTAR</h1>
        </a>
        <div class="flex gap-6 md:gap-10 uppercase text-[10px] md:text-[12px] font-bold tracking-[0.1em] md:tracking-[0.2em]">
            <a href="index.html" class="text-yellow-400">Inicio</a>
            <a href="productos.html" class="text-zinc-500 hover:text-white transition">Productos</a>
            <a href="contacto.html" class="text-zinc-500 hover:text-white transition">Contacto</a>
        </div>
    </nav>

    <header class="relative h-[70vh] md:h-[80vh] w-full overflow-hidden bg-black group">
        
        <div id="carousel" class="absolute inset-0 w-full h-full">
            <div class="carousel-item absolute inset-0 opacity-100 transition-opacity duration-1000 ease-in-out">
                <img src="images/banner1.jpg" class="w-full h-full object-cover opacity-40">
            </div>
            <div class="carousel-item absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
                <img src="images/banner2.jpg" class="w-full h-full object-cover opacity-40">
            </div>
            <div class="carousel-item absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
                <img src="images/banner3.jpg" class="w-full h-full object-cover opacity-40">
            </div>
            <div class="carousel-item absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
                <img src="images/banner4.jpg" class="w-full h-full object-cover opacity-40">
            </div>
            <div class="carousel-item absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
                <img src="images/banner5.jpg" class="w-full h-full object-cover opacity-40">
            </div>
            <div class="carousel-item absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
                <img src="images/banner6.jpg" class="w-full h-full object-cover opacity-40">
            </div>
        </div>

        <div class="relative z-10 flex flex-col items-center justify-center h-full text-center px-4 pointer-events-none">
            <h2 class="text-5xl md:text-[110px] font-black italic text-yellow-400 leading-none uppercase tracking-tighter">
                LEGSTAR <span class="text-white">CORE</span>
            </h2>
            <p class="text-zinc-300 text-lg md:text-2xl font-light italic mt-4">Bienvenidos a la nueva era del estilo.</p>
        </div>

        <button onclick="prevSlide()" class="absolute left-4 top-1/2 -translate-y-1/2 z-20 bg-black/50 text-white p-3 rounded-full hover:bg-yellow-400 hover:text-black transition opacity-0 group-hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <button onclick="nextSlide()" class="absolute right-4 top-1/2 -translate-y-1/2 z-20 bg-black/50 text-white p-3 rounded-full hover:bg-yellow-400 hover:text-black transition opacity-0 group-hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </button>

        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 flex gap-2">
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(0)"></div>
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(1)"></div>
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(2)"></div>
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(3)"></div>
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(4)"></div>
            <div class="dot w-3 h-3 rounded-full bg-white/30 cursor-pointer transition" onclick="showSlide(5)"></div>
        </div>
    </header>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-item');
        const dots = document.querySelectorAll('.dot');
        let timer = setInterval(nextSlide, 4000);

        function updateCarousel() {
            slides.forEach((slide, index) => {
                slide.classList.replace(index === currentSlide ? 'opacity-0' : 'opacity-100', index === currentSlide ? 'opacity-100' : 'opacity-0');
            });
            dots.forEach((dot, index) => {
                dot.style.backgroundColor = index === currentSlide ? '#facc15' : 'rgba(255,255,255,0.3)';
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            updateCarousel();
            resetTimer();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            updateCarousel();
            resetTimer();
        }

        function showSlide(index) {
            currentSlide = index;
            updateCarousel();
            resetTimer();
        }

        function resetTimer() {
            clearInterval(timer);
            timer = setInterval(nextSlide, 4000);
        }

        // Iniciar puntito amarillo
        updateCarousel();
    </script>Bienvenidos a la nueva era del estilo.</p>
    </header>

    <footer class="p-10 border-t border-zinc-900 text-center text-zinc-700 text-xs bg-black">
        &copy; 2026 LEGSTAR OFFICIAL
    </footer>

</body>
</html>
