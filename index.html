<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGSTAR | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-sans">
    <nav class="p-6 flex justify-between items-center bg-black border-b border-zinc-800 sticky top-0 z-50">

            <span class="text-2xl font-black text-[#ffcc00] tracking-tighter">LEGSTAR</span>
        </div>
        <div class="hidden md:flex gap-8 text-xs font-bold tracking-widest">
