<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGSTAR | Contacto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">INICIO</a>
        <a href="productos.html">PRODUCTOS</a>
        <a href="contacto.html">CONTACTO</a>
    </nav>

    <main class="contacto-section">
        <div class="form-container">
            <h2>CONTÁCTANOS</h2>
            <p>¿Tienes dudas sobre talles o envíos? Escríbenos.</p>
            
            <form>
                <label>Nombre</label>
                <input type="text" placeholder="Tu nombre..." required>
                
                <label>Email</label>
                <input type="email" placeholder="tu@correo.com" required>
                
                <label>Mensaje</label>
                <textarea rows="5" placeholder="Escribe tu consulta aquí..."></textarea>
                
                <button type="submit" class="btn-enviar">ENVIAR CONSULTA</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 LEGSTAR OFFICIAL</p>
    </footer>
</body>
</html>
