<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGSTAR | Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">

    <nav class="p-5 border-b border-zinc-800 flex justify-between items-center sticky top-0 bg-black z-50">
        <a href="index.html" class="flex items-center gap-3">
            <img src="images/LOGO.jpg" alt="LOGO" class="h-20 w-auto">
            <h1 class="text-3xl font-black text-yellow-400 uppercase">LEGSTAR</h1>
        </a>
        <div class="space-x-8 uppercase text-sm font-bold">
            <a href="index.html" class="hover:text-yellow-400 transition">Inicio</a>
            <a href="productos.html" class="text-yellow-400">Productos</a>
            <a href="contacto.html" class="hover:text-yellow-400 transition">Contacto</a>
        </div>
    </nav>

    <main class="container mx-auto py-16 px-4">
        <div class="flex items-center gap-4 mb-12">
            <div class="w-2 h-10 bg-yellow-400"></div>
            <h2 class="text-5xl font-black uppercase italic">CATÁLOGO</h2>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="bg-zinc-900 border border-zinc-800 p-4 hover:border-yellow-400 transition group">
                <div class="h-80 bg-zinc-800 mb-4 overflow-hidden flex items-center justify-center">
                     <img src="images/producto1.jpg" alt="Producto A" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition">
                </div>
                <h4 class="text-xl font-bold uppercase tracking-tighter">PRODUCTO LEGSTAR A</h4>
                <p class="text-yellow-400 font-black text-3xl mt-4">$1,500</p>
            </div>

            <div class="bg-zinc-900 border border-zinc-800 p-4 hover:border-yellow-400 transition group">
                <div class="h-80 bg-zinc-800 mb-4 overflow-hidden flex items-center justify-center">
                     <img src="images/producto2.jpg" alt="Producto B" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition">
                </div>
                <h4 class="text-xl font-bold uppercase tracking-tighter">PRODUCTO LEGSTAR B</h4>
                <p class="text-yellow-400 font-black text-3xl mt-4">$900</p>
            </div>

        </div>
    </main>

    <footer class="p-10 border-t border-zinc-900 text-center text-zinc-600 text-xs mt-20">
        &copy; 2026 LEGSTAR OFFICIAL
    </footer>

</body>
</html>
