<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGSTAR | Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-white">
    <nav class="p-6 flex justify-between items-center bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <img src="images/logo.png" alt="logo" class="h-8">
            <span class="text-2xl font-black text-[#ffcc00] tracking-tighter">LEGSTAR</span>
        </div>
        <div class="flex gap-8 text-xs font-bold tracking-widest">
            <a href="index.html" class="hover:text-[#ffcc00]">INICIO</a>
            <a href="productos.html" class="text-[#ffcc00]">PRODUCTOS</a>
            <a href="contacto.html" class="hover:text-[#ffcc00]">CONTACTO</a>
        </div>
    </nav>

    <main class="container mx-auto py-16 px-6">
        <div class="flex items-center gap-4 mb-16">
            <div class="w-2 h-10 bg-[#ffcc00]"></div>
            <h2 class="text-5xl font-black uppercase italic tracking-tighter">CATÁLOGO</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="bg-[#111] group cursor-pointer border border-transparent hover:border-zinc-700 transition">
                <div class="aspect-square bg-zinc-800 overflow-hidden">
                    <img src="images/producto1.jpg" class="w-full h-full object-cover group-hover:scale-110 transition duration-500 opacity-80 group-hover:opacity-100">
                </div>
                <div class="p-6">
                    <h3 class="font-bold text-lg mb-2 text-zinc-300 uppercase">PRODUCTO LEGSTAR A</h3>
                    <p class="text-[#ffcc00] text-2xl font-black">$1,500</p>
                </div>
            </div>

            <div class="bg-[#111] group cursor-pointer border border-transparent hover:border-zinc-700 transition">
                <div class="aspect-square bg-zinc-800 overflow-hidden">
                    <img src="images/producto2.jpg" class="w-full h-full object-cover group-hover:scale-110 transition duration-500 opacity-80 group-hover:opacity-100">
                </div>
                <div class="p-6">
                    <h3 class="font-bold text-lg mb-2 text-zinc-300 uppercase">PRODUCTO LEGSTAR B</h3>
                    <p class="text-[#ffcc00] text-2xl font-black">$900</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
